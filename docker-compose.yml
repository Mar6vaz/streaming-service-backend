version: '3.8'

services:

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"       # Puerto AMQP (para tu código)
      - "15672:15672"     # Puerto interfaz web (para ver en el navegador)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cinestream

  playback_service:
    build: .
    container_name: playback_service
    ports:
      - "8003:8003"
    environment:
      PORT: 8003
      MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/   # ← nombre del servicio, no localhost
    depends_on:
      rabbitmq:
        condition: service_healthy   # espera a que rabbit esté listo antes de arrancar
    networks:
      - cinestream

networks:
  cinestream:
    driver: bridge